<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AIB - Oyun</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050a0f;
      --panel: #0a1520;
      --accent: #00e5ff;
      --accent2: #ff2d6b;
      --gold: #ffd700;
      --text: #c8e6f5;
      --glow: 0 0 18px #00e5ff88, 0 0 40px #00e5ff33;
      --glow-red: 0 0 18px #ff2d6b88, 0 0 40px #ff2d6b33;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Arka plan ızgarası ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(0,229,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Ekranlar ── */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      opacity: 0;
      pointer-events: none;
      transition: opacity .5s;
    }
    .screen.active { opacity: 1; pointer-events: all; }

    /* ── Kart çerçevesi ── */
    .card {
      background: var(--panel);
      border: 1px solid #00e5ff44;
      border-radius: 18px;
      padding: 52px 48px;
      max-width: 480px;
      width: 92%;
      text-align: center;
      box-shadow: var(--glow), inset 0 0 60px #00e5ff08;
      position: relative;
    }
    .card::before {
      content: '';
      position: absolute;
      top: -1px; left: 20%; right: 20%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 2px;
    }

    /* ── Logo / Başlık ── */
    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: .2em;
      color: var(--accent);
      text-shadow: var(--glow);
      line-height: 1;
    }
    .logo-sub {
      font-size: .8rem;
      letter-spacing: .35em;
      color: #00e5ff88;
      margin-top: 6px;
      text-transform: uppercase;
    }
    .divider {
      border: none;
      border-top: 1px solid #00e5ff22;
      margin: 28px 0;
    }

    /* ── Intro yazı animasyonu ── */
    #intro-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      letter-spacing: .12em;
      color: var(--accent);
      min-height: 28px;
      text-shadow: var(--glow);
    }
    .cursor {
      display: inline-block;
      width: 10px; height: 1.1em;
      background: var(--accent);
      vertical-align: middle;
      margin-left: 3px;
      animation: blink .7s steps(1) infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Girdi & Buton ── */
    .label {
      font-size: .75rem;
      letter-spacing: .25em;
      color: #00e5ff99;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: block;
    }
    input[type="password"], input[type="text"] {
      width: 100%;
      background: #071218;
      border: 1px solid #00e5ff44;
      border-radius: 8px;
      color: var(--accent);
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem;
      letter-spacing: .3em;
      padding: 14px 18px;
      text-align: center;
      outline: none;
      transition: border-color .3s, box-shadow .3s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: var(--glow);
    }
    .error-msg {
      color: var(--accent2);
      font-size: .78rem;
      letter-spacing: .15em;
      margin-top: 10px;
      min-height: 18px;
      text-shadow: var(--glow-red);
    }

    .btn {
      display: inline-block;
      margin-top: 22px;
      padding: 14px 40px;
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 8px;
      color: var(--accent);
      font-family: 'Orbitron', sans-serif;
      font-size: .85rem;
      letter-spacing: .2em;
      cursor: pointer;
      text-transform: uppercase;
      transition: background .25s, box-shadow .25s, color .25s;
    }
    .btn:hover {
      background: var(--accent);
      color: var(--bg);
      box-shadow: var(--glow);
    }

    /* ── Oyun ── */
    .game-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      letter-spacing: .25em;
      color: var(--accent);
      text-shadow: var(--glow);
      margin-bottom: 8px;
    }
    .game-question {
      font-size: 1.05rem;
      color: var(--text);
      letter-spacing: .08em;
      margin-bottom: 30px;
    }
    .choices {
      display: flex;
      gap: 24px;
      justify-content: center;
    }
    .choice-btn {
      width: 100px; height: 100px;
      border-radius: 14px;
      font-family: 'Orbitron', sans-serif;
      font-size: 2.2rem;
      font-weight: 900;
      cursor: pointer;
      border: 2px solid #00e5ff55;
      background: #071218;
      color: var(--text);
      transition: all .2s;
      position: relative;
      overflow: hidden;
    }
    .choice-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, #00e5ff22, transparent 70%);
      opacity: 0;
      transition: opacity .2s;
    }
    .choice-btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: var(--glow); }
    .choice-btn:hover::after { opacity: 1; }
    .choice-btn.selected-win { border-color: var(--gold); color: var(--gold); box-shadow: 0 0 20px #ffd70088; }
    .choice-btn.selected-lose { border-color: var(--accent2); color: var(--accent2); box-shadow: var(--glow-red); }

    /* ── Kura animasyonu ── */
    #spin-screen .card { min-height: 280px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .spin-number {
      font-family: 'Orbitron', sans-serif;
      font-size: 5rem;
      font-weight: 900;
      color: var(--accent);
      text-shadow: var(--glow);
      transition: color .1s;
    }
    .spin-label {
      font-size: .75rem;
      letter-spacing: .3em;
      color: #00e5ff66;
      margin-top: 12px;
    }

    /* ── Sonuç ── */
    .result-icon {
      font-size: 3.5rem;
      margin-bottom: 16px;
      animation: popIn .4s cubic-bezier(.26,1.8,.7,1) both;
    }
    @keyframes popIn { from { transform: scale(0) rotate(-20deg); opacity: 0; } to { transform: scale(1) rotate(0); opacity: 1; } }
    .result-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: .15em;
    }
    .result-title.win { color: var(--gold); text-shadow: 0 0 20px #ffd70099; }
    .result-title.lose { color: var(--accent2); text-shadow: var(--glow-red); }
    .result-sub { font-size: .85rem; letter-spacing: .2em; margin-top: 10px; color: #aaa; }

    /* ── 2. Oyun şifre ekranı ── */
    .second-pass-wrap { margin-top: 28px; }
    .locked-msg {
      font-size: .8rem;
      letter-spacing: .18em;
      color: #ff2d6b99;
      margin-bottom: 16px;
    }

    /* Parçacık efektleri */
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 999; }
    .particle {
      position: absolute;
      width: 8px; height: 8px;
      border-radius: 50%;
      animation: fall linear forwards;
    }
    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

<!-- EKRAN 1: Intro -->
<div class="screen active" id="intro-screen">
  <div class="card">
    <div class="logo">AIB</div>
    <div class="logo-sub">Tek şansın var bu AİB </div>
    <hr class="divider"/>
    <div id="intro-text"></div><br/><br/>
    <button class="btn" id="intro-btn" style="display:none">Devam Et →</button>
  </div>
</div>

<!-- EKRAN 2: Şifre -->
<div class="screen" id="pass-screen">
  <div class="card">
    <div class="logo">AIB</div>
    <hr class="divider"/>
    <span class="label">Sonuç İçin Şifre Giriniz</span>
    <input type="password" id="pass-input" placeholder="••••••" maxlength="20" autofocus/>
    <div class="error-msg" id="pass-error"></div>
    <button class="btn" id="pass-btn">GİRİŞ</button>
  </div>
</div>

<!-- EKRAN 3: Oyun -->
<div class="screen" id="game-screen">
  <div class="card">
    <div class="game-title">▸ KURA SİSTEMİ</div>
    <hr class="divider"/>
    <p class="game-question">0 ve 1 arasından bir sayı seçin</p>
    <div class="choices">
      <button class="choice-btn" id="btn0">0</button>
      <button class="choice-btn" id="btn1">1</button>
    </div>
  </div>
</div>

<!-- EKRAN 4: Kura animasyonu -->
<div class="screen" id="spin-screen">
  <div class="card">
    <div class="spin-label">KURA ÇEKİLİYOR</div>
    <div class="spin-number" id="spin-num">?</div>
    <div class="spin-label" id="spin-sub">lütfen bekleyin...</div>
  </div>
</div>

<!-- EKRAN 5: Sonuç -->
<div class="screen" id="result-screen">
  <div class="card">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-sub" id="result-sub"></div>

    <!-- 2. Oyun alanı -->
    <div class="second-pass-wrap" id="second-game-area">
      <div class="locked-msg">⚠ Her kullanıcı yalnızca 1 oyun oynayabilir.</div>
      <button class="btn" id="want-second-btn" style="border-color:#ffd700;color:#ffd700;">2. Oyunu Oynamak İstiyorum</button>
      <div id="second-pass-section" style="display:none; margin-top:18px;">
        <span class="label">2. Oyun İçin Şifre Giriniz</span>
        <input type="password" id="second-pass-input" placeholder="••••••" maxlength="30"/>
        <div class="error-msg" id="second-pass-error"></div>
        <button class="btn" id="second-pass-btn">ONAYLA</button>
      </div>
    </div>
  </div>
</div>

<!-- Parçacık kapsayıcısı -->
<div class="particles" id="particles"></div>

<script>
  const $ = id => document.getElementById(id);
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    $(id).classList.add('active');
  }

  // ─── Intro yazı animasyonu ───
  const introMsg = 'AIB TARAFINDAN OLUŞTURULDU';
  let idx = 0;
  const introEl = $('intro-text');
  const cursor = '<span class="cursor"></span>';

  function typeIntro() {
    if (idx <= introMsg.length) {
      introEl.innerHTML = introMsg.slice(0, idx) + cursor;
      idx++;
      setTimeout(typeIntro, 75);
    } else {
      setTimeout(() => { $('intro-btn').style.display = 'inline-block'; }, 500);
    }
  }
  setTimeout(typeIntro, 600);

  $('intro-btn').addEventListener('click', () => showScreen('pass-screen'));

  // ─── Şifre (giriş) ───
  const SECRET = 'huy';
  $('pass-btn').addEventListener('click', checkPass);
  $('pass-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkPass(); });

  function checkPass() {
    const val = $('pass-input').value.trim().toLowerCase();
    if (val === SECRET) {
      showScreen('game-screen');
    } else {
      $('pass-error').textContent = '✗ Hatalı şifre. Tekrar deneyin.';
      $('pass-input').value = '';
      $('pass-input').focus();
      setTimeout(() => { $('pass-error').textContent = ''; }, 2500);
    }
  }

  // ─── Oyun ───
  let playerChoice = null;
  const CORRECT = 1;

  $('btn0').addEventListener('click', () => startSpin(0));
  $('btn1').addEventListener('click', () => startSpin(1));

  function startSpin(choice) {
    playerChoice = choice;
    // Oyun oynanmış olarak işaretle
    localStorage.setItem('aib_played', '1');
    showScreen('spin-screen');
    animateSpin();
  }

  // ─── Kura animasyonu ───
  function animateSpin() {
    const spinEl = $('spin-num');
    const subEl  = $('spin-sub');
    let count = 0;
    const total = 30;
    const interval = setInterval(() => {
      spinEl.textContent = Math.random() < .5 ? '0' : '1';
      spinEl.style.color = Math.random() < .5 ? '#00e5ff' : '#ff2d6b';
      count++;
      if (count > total * .7) subEl.textContent = 'neredeyse...';
      if (count >= total) {
        clearInterval(interval);
        spinEl.textContent = CORRECT;
        spinEl.style.color = '#ffd700';
        subEl.textContent  = 'kura tamamlandı!';
        setTimeout(showResult, 900);
      }
    }, 80);
  }

  // ─── Sonuç ───
  function showResult() {
    const won = playerChoice === CORRECT;
    $('result-icon').textContent  = won ? '🏆' : '💀';
    $('result-title').textContent = won ? 'KAZANDINIZ!' : 'KAYBETTİNİZ';
    $('result-title').className   = 'result-title ' + (won ? 'win' : 'lose');
    $('result-sub').textContent   = won
      ? 'Tebrikler! Doğru tahmin yaptınız.'
      : 'Şansınızı tekrar deneyin.';
    showScreen('result-screen');
    if (won) launchConfetti();
    else launchDark();
  }

  // ─── 2. Oyun butonu ───
  $('want-second-btn').addEventListener('click', () => {
    $('want-second-btn').style.display = 'none';
    $('second-pass-section').style.display = 'block';
    $('second-pass-input').focus();
  });

  const SECRET2 = 'oyunoynamakbasittir';
  $('second-pass-btn').addEventListener('click', checkSecondPass);
  $('second-pass-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkSecondPass(); });

  function checkSecondPass() {
    const val = $('second-pass-input').value.trim().toLowerCase();
    if (val === SECRET2) {
      // Kilit kaldır, oyunu sıfırla
      localStorage.removeItem('aib_played');
      playerChoice = null;
      $('second-pass-input').value = '';
      $('second-pass-section').style.display = 'none';
      $('want-second-btn').style.display = 'inline-block';
      $('particles').innerHTML = '';
      showScreen('game-screen');
    } else {
      $('second-pass-error').textContent = '✗ Hatalı şifre.';
      $('second-pass-input').value = '';
      $('second-pass-input').focus();
      setTimeout(() => { $('second-pass-error').textContent = ''; }, 2500);
    }
  }

  // ─── Konfeti ───
  function launchConfetti() {
    const colors = ['#ffd700','#00e5ff','#ff2d6b','#a8ff78','#ffffff'];
    const p = $('particles');
    for (let i = 0; i < 70; i++) {
      const el = document.createElement('div');
      el.className = 'particle';
      el.style.cssText = `
        left:${Math.random()*100}vw;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        width:${4+Math.random()*8}px;height:${4+Math.random()*8}px;
        animation-duration:${1.5+Math.random()*2}s;
        animation-delay:${Math.random()*.8}s;
      `;
      p.appendChild(el);
    }
    setTimeout(() => p.innerHTML = '', 4000);
  }

  function launchDark() {
    const p = $('particles');
    for (let i = 0; i < 30; i++) {
      const el = document.createElement('div');
      el.className = 'particle';
      el.style.cssText = `
        left:${Math.random()*100}vw;
        background:#ff2d6b;
        width:${3+Math.random()*5}px;height:${3+Math.random()*5}px;
        animation-duration:${2+Math.random()*2}s;
        animation-delay:${Math.random()*1}s;
        opacity:.6;
      `;
      p.appendChild(el);
    }
    setTimeout(() => p.innerHTML = '', 5000);
  }
</script>
</body>
</html>
